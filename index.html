<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shina Dictionary</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>📖 Shina Dictionary</h1>
    <p>Translate Shina • Urdu • English</p>
</header>

<div class="container">

    <div class="search-box">

        <input
        type="text"
        id="searchInput"
        placeholder="Type a word...">

        <button onclick="searchWord()">
            Search
        </button>

    </div>

    <div id="result">

        <h2>Search Result</h2>

        <p>Search a word to see its translation.</p>

    </div>

    <hr>

    <h2>Add New Word</h2>

    <div class="add-word">

        <input
        type="text"
        id="shina"
        placeholder="Shina Word">

        <input
        type="text"
        id="urdu"
        placeholder="Urdu Meaning">

        <input
        type="text"
        id="english"
        placeholder="English Meaning">

        <input
        type="text"
        id="pronunciation"
        placeholder="Pronunciation">

        <textarea
        id="example"
        placeholder="Example Sentence"></textarea>

        <button onclick="addWord()">
            Save Word
        </button>

    </div>

</div>

<footer>

Made with ❤️ for the Shina Language

</footer>

<script src="words.js"></script>
<script src="script.js"></script>

</body>
</html>
